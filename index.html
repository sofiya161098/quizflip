<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuizFlip — English Flashcards</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    Babel.registerPreset('react-classic', {
      presets: [[Babel.availablePresets['react'], { runtime: 'classic' }]],
    });
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Manrope', system-ui, sans-serif; background: #FAF8F3; margin: 0; }
    .font-display { font-family: 'Bricolage Grotesque', sans-serif; font-optical-sizing: auto; letter-spacing: -0.02em; }
    .flip-card { perspective: 1600px; }
    .flip-inner { position: relative; transform-style: preserve-3d; transition: transform 0.55s cubic-bezier(0.4,0,0.2,1); width: 100%; height: 100%; }
    .flip-inner.flipped { transform: rotateY(180deg); }
    .flip-face { position: absolute; inset: 0; backface-visibility: hidden; -webkit-backface-visibility: hidden; }
    .flip-back { transform: rotateY(180deg); }
    @keyframes pop-in { from { opacity: 0; transform: scale(0.94); } to { opacity: 1; transform: scale(1); } }
    .animate-pop { animation: pop-in 0.35s cubic-bezier(0.34, 1.56, 0.64, 1); }
    @keyframes slide-up { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    .animate-slide-up { animation: slide-up 0.45s ease-out backwards; }
    @keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }
    .animate-shake { animation: shake 0.4s; }
    input:focus, textarea:focus { outline: none; }
    textarea { font-family: inherit; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react-classic">

    const { useState, useEffect, useMemo, useRef } = React;

    /* ──────────── Icons ──────────── */
    const Icon = ({ size = 20, children, className = '', fill = 'none' }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>
    );
    const Plus = (p) => <Icon {...p}><path d="M5 12h14M12 5v14"/></Icon>;
    const X = (p) => <Icon {...p}><path d="M18 6 6 18M6 6l12 12"/></Icon>;
    const Check = (p) => <Icon {...p}><path d="M20 6 9 17l-5-5"/></Icon>;
    const Trash2 = (p) => <Icon {...p}><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M10 11v6M14 11v6"/></Icon>;
    const Edit2 = (p) => <Icon {...p}><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></Icon>;
    const ChevronLeft = (p) => <Icon {...p}><path d="m15 18-6-6 6-6"/></Icon>;
    const ChevronRight = (p) => <Icon {...p}><path d="m9 18 6-6-6-6"/></Icon>;
    const Shuffle = (p) => <Icon {...p}><path d="M2 18h1.4c1.3 0 2.5-.6 3.3-1.7l6.1-8.6c.7-1.1 2-1.7 3.3-1.7H22M18 2l4 4-4 4M2 6h1.9c1.5 0 2.9.9 3.6 2.2M22 18h-5.9c-1.3 0-2.6-.7-3.3-1.8l-.5-.8M18 14l4 4-4 4"/></Icon>;
    const ArrowLeft = (p) => <Icon {...p}><path d="m12 19-7-7 7-7M19 12H5"/></Icon>;
    const Sparkles = (p) => <Icon {...p}><path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/></Icon>;
    const Trophy = (p) => <Icon {...p}><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6M18 9h1.5a2.5 2.5 0 0 0 0-5H18M4 22h16M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22M18 2H6v7a6 6 0 0 0 12 0V2Z"/></Icon>;
    const Clock = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></Icon>;
    const Save = (p) => <Icon {...p}><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2zM17 21v-8H7v8M7 3v5h8"/></Icon>;
    const Zap = (p) => <Icon {...p}><path d="M13 2 3 14h9l-1 8 10-12h-9l1-8z"/></Icon>;
    const RotateCw = (p) => <Icon {...p}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8M3 3v5h5"/></Icon>;
    const Layers = (p) => <Icon {...p}><path d="M12 2 2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></Icon>;
    const Brain = (p) => <Icon {...p}><path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .556 6.588A4 4 0 1 0 12 18ZM12 5a3 3 0 1 1 5.997.125 4 4 0 0 1 2.526 5.77 4 4 0 0 1-.556 6.588A4 4 0 1 1 12 18ZM12 5v13"/></Icon>;
    const ClipboardCheck = (p) => <Icon {...p}><rect x="8" y="2" width="8" height="4" rx="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2M9 14l2 2 4-4"/></Icon>;
    const Download = (p) => <Icon {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></Icon>;
    const Upload = (p) => <Icon {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></Icon>;
    const Volume2 = (p) => <Icon {...p}><path d="M11 5 6 9H2v6h4l5 4V5zM15.54 8.46a5 5 0 0 1 0 7.07M19.07 4.93a10 10 0 0 1 0 14.14"/></Icon>;
    const FileText = (p) => <Icon {...p}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8zM14 2v6h6M16 13H8M16 17H8M10 9H8"/></Icon>;
    const Flame = (p) => <Icon {...p}><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></Icon>;

    /* Extracts IPA from definitions like "/ˈfɜːtəlaɪzərz/ — удобрения" and renders it on the front face. */
    const Transcription = ({ definition }) => {
      const m = definition && definition.match(/^\/([^/]+)\//);
      return m ? <div className="text-base md:text-lg text-stone-500 mt-1 italic">/{m[1]}/</div> : null;
    };
    /* Strips the "/IPA/ — " prefix from a definition so the back face shows only the translation. */
    const stripIpa = (def) => {
      if (!def) return '';
      const stripped = def.replace(/^\/[^/]+\/\s*[—–-]?\s*/, '');
      return stripped || def;
    };

    /* ──────────── Constants ──────────── */
    const STORAGE_KEY = 'quizflip:decks:v2';
    const OFFICIAL_DECKS_URL = 'decks.json';
    const BOX_INTERVALS = [0, 1*864e5, 3*864e5, 7*864e5, 14*864e5, 30*864e5];
    const BOX_LABELS = ['New', '1d', '3d', '7d', '14d', '30d'];

    const COLOR_THEMES = {
      indigo: { bg: 'bg-indigo-50', text: 'text-indigo-600', solid: '#4255FF' },
      coral:  { bg: 'bg-orange-50', text: 'text-orange-600', solid: '#FF6F61' },
      emerald:{ bg: 'bg-emerald-50', text: 'text-emerald-600', solid: '#10B981' },
      amber:  { bg: 'bg-amber-50', text: 'text-amber-700', solid: '#F59E0B' },
      rose:   { bg: 'bg-rose-50', text: 'text-rose-600', solid: '#F43F5E' },
    };
    const COLOR_KEYS = Object.keys(COLOR_THEMES);

    const LANG_OPTIONS = [
      { code: 'en-US', label: 'English (US)' },
      { code: 'en-GB', label: 'English (UK)' },
      { code: 'ru-RU', label: 'Russian' },
      { code: 'es-ES', label: 'Spanish' },
      { code: 'fr-FR', label: 'French' },
      { code: 'de-DE', label: 'German' },
      { code: 'it-IT', label: 'Italian' },
      { code: 'pt-PT', label: 'Portuguese' },
      { code: 'ja-JP', label: 'Japanese' },
      { code: 'zh-CN', label: 'Chinese' },
    ];

    /* ──────────── Helpers ──────────── */
    const uid = () => Math.random().toString(36).slice(2, 10);
    const shuffle = (arr) => { const a = [...arr]; for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; };

    function speak(text, lang = 'en-US') {
      if (!('speechSynthesis' in window) || !text) return;
      try {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.lang = lang;
        u.rate = 0.92;
        window.speechSynthesis.speak(u);
      } catch {}
    }

    function migrateDeck(d) {
      return {
        ...d,
        termLang: d.termLang || 'en-US',
        defLang: d.defLang || 'ru-RU',
        cards: (d.cards || []).map((c) => ({
          ...c,
          box: c.box ?? 0,
          lastReview: c.lastReview ?? 0,
          streak: c.streak ?? 0,
        })),
      };
    }

    function isDue(card, now = Date.now()) {
      const box = card.box ?? 0;
      if (box === 0) return true;
      const interval = BOX_INTERVALS[Math.min(box, BOX_INTERVALS.length - 1)];
      return (card.lastReview ?? 0) + interval <= now;
    }

    function deckStats(deck, now = Date.now()) {
      let neww = 0, due = 0, mastered = 0, learning = 0;
      for (const c of deck.cards) {
        const box = c.box ?? 0;
        if (box === 0) neww++;
        else if (box >= 5) mastered++;
        else learning++;
        if (isDue(c, now)) due++;
      }
      return { new: neww, learning, mastered, due, total: deck.cards.length };
    }

    function updateCardProgress(card, knew) {
      const cur = card.box ?? 0;
      return {
        ...card,
        box: knew ? Math.min(cur + 1, 5) : Math.max(cur - 1, 0),
        lastReview: Date.now(),
        streak: knew ? (card.streak ?? 0) + 1 : 0,
      };
    }

    function parseBulkText(text) {
      const lines = text.split('\n').map((l) => l.trim()).filter(Boolean);
      const result = [];
      const seps = [/\t+/, / *— */, / *– */, / +- +/, / *: */, / *= */, / *\| */];
      for (const line of lines) {
        let parts = null;
        for (const sep of seps) {
          const m = line.split(sep);
          if (m.length >= 2 && m[0].trim() && m.slice(1).join(' ').trim()) {
            parts = [m[0].trim(), m.slice(1).join(' ').trim()];
            break;
          }
        }
        if (parts) result.push({ id: uid(), term: parts[0], definition: parts[1], box: 0, lastReview: 0, streak: 0 });
      }
      return result;
    }

    const loadDecks = () => {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) return JSON.parse(raw).map(migrateDeck);
      } catch {}
      try {
        const v1 = localStorage.getItem('quizflip:decks:v1');
        if (v1) return JSON.parse(v1).map(migrateDeck);
      } catch {}
      return null;
    };
    const persistDecks = (decks) => { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(decks)); } catch (e) { console.error(e); } };

    async function fetchOfficialDecks() {
      try {
        const res = await fetch(`${OFFICIAL_DECKS_URL}?t=${Date.now()}`, { cache: 'no-store' });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        return Array.isArray(data) ? data : [];
      } catch (e) {
        console.warn('Could not fetch official decks:', e);
        return null;
      }
    }

    function mergeOfficialDecks(localDecks, officialDecks) {
      const localById = new Map((localDecks || []).map((d) => [d.id, d]));
      const officialIds = new Set(officialDecks.map((d) => d.id));
      const result = [];

      for (const remote of officialDecks) {
        const local = localById.get(remote.id);
        const remoteVersion = remote.version ?? 0;
        const localVersion = local?.version ?? 0;

        if (!local) {
          result.push(migrateDeck({ ...remote, isOfficial: true }));
        } else if (remoteVersion > localVersion) {
          const localCardById = new Map(local.cards.map((c) => [c.id, c]));
          const mergedCards = remote.cards.map((c) => {
            const lc = localCardById.get(c.id);
            return {
              ...c,
              box: lc?.box ?? 0,
              lastReview: lc?.lastReview ?? 0,
              streak: lc?.streak ?? 0,
            };
          });
          result.push(migrateDeck({ ...remote, isOfficial: true, cards: mergedCards }));
        } else {
          result.push({ ...local, isOfficial: true, version: localVersion });
        }
      }

      for (const local of (localDecks || [])) {
        if (!officialIds.has(local.id) && !local.isOfficial) {
          result.push(local);
        }
      }

      return result;
    }

    /* ──────────── App ──────────── */
    function App() {
      const [view, setView] = useState('home');
      const [decks, setDecks] = useState([]);
      const [currentDeckId, setCurrentDeckId] = useState(null);
      const [editorDeck, setEditorDeck] = useState(null);
      const [reviewMode, setReviewMode] = useState('due');

      const currentDeck = useMemo(() => decks.find((d) => d.id === currentDeckId), [decks, currentDeckId]);

      useEffect(() => {
        const stored = loadDecks() || [];
        setDecks(stored);
        (async () => {
          const official = await fetchOfficialDecks();
          if (!official) return;
          const merged = mergeOfficialDecks(stored, official);
          setDecks(merged);
          persistDecks(merged);
        })();
      }, []);

      const save = (next) => { setDecks(next); persistDecks(next); };
      const saveDeck = (deck) => {
        const exists = decks.some((d) => d.id === deck.id);
        save(exists ? decks.map((d) => (d.id === deck.id ? deck : d)) : [...decks, deck]);
      };
      const deleteDeck = (id) => save(decks.filter((d) => d.id !== id));

      const updateCardsInDeck = (deckId, cardUpdates) => {
        const map = new Map(cardUpdates.map((c) => [c.id, c]));
        save(decks.map((d) => d.id !== deckId ? d : ({ ...d, cards: d.cards.map((c) => map.get(c.id) || c) })));
      };

      const resetProgress = (deckId) => {
        if (!confirm('Reset progress for all cards in this deck?')) return;
        save(decks.map((d) => d.id !== deckId ? d : ({ ...d, cards: d.cards.map((c) => ({ ...c, box: 0, lastReview: 0, streak: 0 })) })));
      };

      const exportDeck = (deck) => {
        const blob = new Blob([JSON.stringify(deck, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `${deck.title.replace(/[^a-z0-9]+/gi, '-').toLowerCase() || 'deck'}.json`;
        a.click(); URL.revokeObjectURL(url);
      };

      const importDeck = (file) => {
        const reader = new FileReader();
        reader.onload = () => {
          try {
            const parsed = JSON.parse(reader.result);
            if (!parsed.title || !Array.isArray(parsed.cards)) throw new Error();
            const imported = migrateDeck({ ...parsed, id: uid(), cards: parsed.cards.map((c) => ({ ...c, id: c.id || uid() })) });
            save([...decks, imported]);
          } catch { alert('Could not import this file. It must be a valid QuizFlip deck JSON.'); }
        };
        reader.readAsText(file);
      };

      return (
        <div className="min-h-screen" style={{ background: '#FAF8F3' }}>
          {view === 'home' && (
            <Home
              decks={decks}
              onOpen={(id) => { setCurrentDeckId(id); setView('deck'); }}
              onCreate={() => setEditorDeck({ id: uid(), title: '', description: '', color: COLOR_KEYS[Math.floor(Math.random() * COLOR_KEYS.length)], termLang: 'en-US', defLang: 'ru-RU', cards: [{ id: uid(), term: '', definition: '', box: 0, lastReview: 0, streak: 0 }, { id: uid(), term: '', definition: '', box: 0, lastReview: 0, streak: 0 }] })}
              onEdit={(d) => setEditorDeck(d)}
              onDelete={deleteDeck}
              onExport={exportDeck}
              onImport={importDeck}
              onQuickReview={(id) => { setCurrentDeckId(id); setReviewMode('due'); setView('review'); }}
            />
          )}
          {view === 'deck' && currentDeck && (
            <DeckView deck={currentDeck} onBack={() => setView('home')} onEdit={() => setEditorDeck(currentDeck)} onMode={(m) => setView(m)} onReset={() => resetProgress(currentDeck.id)} />
          )}
          {view === 'flashcards' && currentDeck && <FlashcardsMode deck={currentDeck} onExit={() => setView('deck')} />}
          {view === 'review' && currentDeck && <ReviewMode deck={currentDeck} mode={reviewMode} onExit={() => setView('deck')} onUpdateCards={(updates) => updateCardsInDeck(currentDeck.id, updates)} />}
          {view === 'test' && currentDeck && <TestMode deck={currentDeck} onExit={() => setView('deck')} onUpdateCards={(updates) => updateCardsInDeck(currentDeck.id, updates)} />}
          {view === 'match' && currentDeck && <MatchMode deck={currentDeck} onExit={() => setView('deck')} />}
          {editorDeck && <DeckEditor deck={editorDeck} onClose={() => setEditorDeck(null)} onSave={(d) => { saveDeck(d); setEditorDeck(null); }} />}
        </div>
      );
    }

    /* ──────────── Home ──────────── */
    function Home({ decks, onOpen, onCreate, onEdit, onDelete, onExport, onImport, onQuickReview }) {
      const fileRef = useRef(null);
      const totalDue = decks.reduce((s, d) => s + deckStats(d).due, 0);
      return (
        <div className="max-w-5xl mx-auto px-6 py-12">
          <header className="flex flex-col md:flex-row md:items-end md:justify-between gap-4 mb-12 animate-slide-up">
            <div>
              <div className="flex items-center gap-2 mb-3 text-stone-500 text-sm font-medium tracking-wide uppercase">
                <Sparkles size={14} /> Your study space
              </div>
              <h1 className="font-display text-6xl md:text-7xl font-extrabold text-stone-900 leading-none">
                QuizFlip<span className="text-indigo-600">.</span>
              </h1>
              <p className="text-stone-500 mt-3 text-lg">
                {totalDue > 0 ? <><span className="text-stone-900 font-semibold">{totalDue}</span> {totalDue === 1 ? 'card' : 'cards'} ready for review today.</> : 'No cards due. Nice work!'}
              </p>
            </div>
            <div className="flex items-center gap-2">
              <input ref={fileRef} type="file" accept="application/json" className="hidden" onChange={(e) => { if (e.target.files[0]) { onImport(e.target.files[0]); e.target.value = ''; } }} />
              <button onClick={() => fileRef.current?.click()} className="flex items-center gap-2 bg-white border border-stone-300 text-stone-700 px-4 py-3 rounded-full font-semibold hover:border-stone-900 transition-colors">
                <Upload size={16} /> Import
              </button>
              <button onClick={onCreate} className="flex items-center gap-2 bg-stone-900 text-white px-5 py-3 rounded-full font-semibold hover:bg-indigo-600 transition-colors shadow-sm">
                <Plus size={18} /> New deck
              </button>
            </div>
          </header>

          {decks.length === 0 ? (
            <div className="border-2 border-dashed border-stone-300 rounded-3xl p-16 text-center">
              <p className="text-stone-500 mb-6">No decks yet. Make your first one!</p>
              <button onClick={onCreate} className="bg-indigo-600 text-white px-6 py-3 rounded-full font-semibold">Create deck</button>
            </div>
          ) : (
            <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
              {decks.map((deck, i) => (
                <DeckCard key={deck.id} deck={deck} index={i}
                  onOpen={() => onOpen(deck.id)}
                  onEdit={() => onEdit(deck)}
                  onExport={() => onExport(deck)}
                  onQuickReview={() => onQuickReview(deck.id)}
                  onDelete={() => { if (confirm(`Delete "${deck.title}"?`)) onDelete(deck.id); }}
                />
              ))}
            </div>
          )}
        </div>
      );
    }

    function DeckCard({ deck, index, onOpen, onEdit, onExport, onDelete, onQuickReview }) {
      const theme = COLOR_THEMES[deck.color] || COLOR_THEMES.indigo;
      const s = deckStats(deck);
      const masteredPct = s.total ? Math.round((s.mastered / s.total) * 100) : 0;
      return (
        <div
          className="group relative bg-white rounded-3xl p-6 border border-stone-200 hover:border-stone-900 hover:shadow-xl hover:-translate-y-0.5 transition-all cursor-pointer animate-slide-up"
          style={{ animationDelay: `${index * 70}ms` }}
          onClick={onOpen}
        >
          <div className="flex items-start justify-between mb-5">
            <div className={`px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider ${theme.bg} ${theme.text}`}>
              {s.total} {s.total === 1 ? 'card' : 'cards'}
            </div>
            <div className="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
              <button onClick={(e) => { e.stopPropagation(); onExport(); }} className="p-2 hover:bg-stone-100 rounded-full" title="Export as JSON">
                <Download size={15} className="text-stone-500" />
              </button>
              <button onClick={(e) => { e.stopPropagation(); onEdit(); }} className="p-2 hover:bg-stone-100 rounded-full" title="Edit">
                <Edit2 size={15} className="text-stone-500" />
              </button>
              {!deck.isOfficial && (
                <button onClick={(e) => { e.stopPropagation(); onDelete(); }} className="p-2 hover:bg-rose-50 rounded-full" title="Delete">
                  <Trash2 size={15} className="text-rose-500" />

                  className="w-full text-3xl font-display font-bold bg-transparent border-b-2 border-stone-300 focus:border-stone-900 pb-2 transition-colors" />

                    className="w-full bg-stone-50 border border-stone-200 rounded-2xl p-4 text-stone-900 focus:border-stone-900 transition-colors font-mono text-sm" />
                  <div className="flex justify-end gap-2 mt-4">

                    <button onClick={applyBulk} className="bg-stone-900 text-white px-5 py-2 rounded-full font-semibold hover:bg-indigo-600 transition-colors">Add cards</button>

    /* ──────────── Flashcards Mode ──────────── */
    function FlashcardsMode({ deck, onExit }) {
      const [order, setOrder] = useState(deck.cards.map((_, i) => i));
      const [idx, setIdx] = useState(0);
      const [flipped, setFlipped] = useState(false);
      const card = deck.cards[order[idx]];
      const next = () => { setFlipped(false); setIdx((i) => Math.min(i + 1, order.length - 1)); };
      const prev = () => { setFlipped(false); setIdx((i) => Math.max(i - 1, 0)); };
      const reshuffle = () => { setOrder(shuffle(deck.cards.map((_, i) => i))); setIdx(0); setFlipped(false); };

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === ' ') { e.preventDefault(); setFlipped((f) => !f); }
          else if (e.key === 'ArrowRight') next();
          else if (e.key === 'ArrowLeft') prev();
          else if (e.key.toLowerCase() === 'p') speak(card.term, deck.termLang);
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, [order.length, card, deck.termLang]);

      return (
        <div className="max-w-3xl mx-auto px-6 py-8 min-h-screen flex flex-col">
          <ModeHeader title={deck.title} subtitle="Flashcards" onExit={onExit} />
          <div className="flex-1 flex flex-col items-center justify-center">
            <div className="text-sm text-stone-500 mb-4 font-medium">{idx + 1} / {order.length}</div>
            <div className="flip-card w-full aspect-[3/2] max-w-2xl cursor-pointer" onClick={() => setFlipped((f) => !f)}>
              <div className={`flip-inner ${flipped ? 'flipped' : ''}`}>
                <div className="flip-face bg-white rounded-3xl border-2 border-stone-200 shadow-lg p-6 md:p-8 flex flex-col items-center justify-center text-center overflow-y-auto">
                  {card.icon && <div className="text-5xl md:text-6xl mb-2 leading-none">{card.icon}</div>}
                  <div className="text-xs uppercase tracking-widest text-stone-400 mb-3 font-bold">Term</div>
                  <div className="font-display text-3xl md:text-5xl font-bold text-stone-900 leading-tight">{card.term}</div>
                  <Transcription definition={card.definition} />
                  <button onClick={(e) => { e.stopPropagation(); speak(card.term, deck.termLang); }} className="mt-4 p-3 bg-stone-100 hover:bg-indigo-100 hover:text-indigo-700 rounded-full transition-colors" title="Play audio (P)">
                    <Volume2 size={20} />
                  </button>
                  {Array.isArray(card.examples) && card.examples.length > 0 && (
                    <div className="mt-5 space-y-1.5 text-stone-600 italic text-sm md:text-base max-w-md">
                      {card.examples.map((ex, i) => <div key={i}>« {ex.en} »</div>)}
                    </div>
                  )}
                  <div className="absolute bottom-3 text-xs text-stone-400">Click or Space to flip · P to play</div>
                </div>
                <div className="flip-face flip-back bg-stone-900 rounded-3xl shadow-lg p-6 md:p-8 flex flex-col items-center justify-center text-center overflow-y-auto">
                  {card.icon && <div className="text-5xl md:text-6xl mb-2 leading-none">{card.icon}</div>}
                  <div className="text-xs uppercase tracking-widest text-stone-500 mb-3 font-bold">Translation</div>
                  <div className="font-display text-2xl md:text-4xl font-bold text-white leading-tight">{stripIpa(card.definition)}</div>
                  {Array.isArray(card.examples) && card.examples.length > 0 && (
                    <div className="mt-5 space-y-2.5 text-sm md:text-base max-w-md">
                      {card.examples.map((ex, i) => (
                        <div key={i}>
                          <div className="italic text-stone-300">« {ex.en} »</div>
                          <div className="text-stone-400 mt-0.5">{ex.ru}</div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              </div>
            </div>
            <div className="flex items-center gap-4 mt-8">
              <button onClick={prev} disabled={idx === 0} className="p-4 rounded-full bg-white border border-stone-200 hover:border-stone-900 disabled:opacity-40 disabled:hover:border-stone-200 transition-colors"><ChevronLeft size={20} /></button>
              <button onClick={reshuffle} className="px-5 py-3 rounded-full bg-white border border-stone-200 hover:border-stone-900 flex items-center gap-2 font-medium transition-colors"><Shuffle size={16} /> Shuffle</button>
              <button onClick={next} disabled={idx === order.length - 1} className="p-4 rounded-full bg-stone-900 text-white hover:bg-indigo-600 disabled:opacity-40 disabled:hover:bg-stone-900 transition-colors"><ChevronRight size={20} /></button>
            </div>
          </div>
        </div>
      );
    }

    /* ──────────── Review Mode (spaced repetition) ──────────── */
    function ReviewMode({ deck, mode, onExit, onUpdateCards }) {
      const [autoSpeak, setAutoSpeak] = useState(true);
      const [filter, setFilter] = useState(mode);
      const filterCards = (m) => {
        const now = Date.now();
        if (m === 'all') return deck.cards;
        if (m === 'new') return deck.cards.filter((c) => (c.box ?? 0) === 0);
        return deck.cards.filter((c) => isDue(c, now));
      };
      const [queue, setQueue] = useState(() => shuffle(filterCards(mode)));
      const [pendingUpdates, setPendingUpdates] = useState([]);
      const [flipped, setFlipped] = useState(false);
      const [doneCount, setDoneCount] = useState(0);
      const pendingRef = useRef([]);
      pendingRef.current = pendingUpdates;
      const card = queue[0];

      useEffect(() => {
        if (autoSpeak && card) {
          const t = setTimeout(() => speak(card.term, deck.termLang), 250);
          return () => clearTimeout(t);
        }
      }, [card?.id, autoSpeak, deck.termLang]);

      // Save on unmount
      useEffect(() => {
        return () => { if (pendingRef.current.length) onUpdateCards(pendingRef.current); };
      }, []);

      const changeFilter = (f) => {
        if (pendingUpdates.length) { onUpdateCards(pendingUpdates); setPendingUpdates([]); }
        setFilter(f);
        setQueue(shuffle(filterCards(f)));
        setFlipped(false);
        setDoneCount(0);
      };

      const mark = (knew) => {
        if (!card) return;
        const updated = updateCardProgress(card, knew);
        setPendingUpdates((p) => [...p.filter((c) => c.id !== updated.id), updated]);
        setFlipped(false);
        setTimeout(() => {
          if (knew) {
            setQueue((q) => q.slice(1));
            setDoneCount((d) => d + 1);
          } else {
            setQueue((q) => {
              const [first, ...rest] = q;
              const insertAt = Math.min(rest.length, 2 + Math.floor(Math.random() * 2));
              return [...rest.slice(0, insertAt), first, ...rest.slice(insertAt)];
            });
          }
        }, 150);
      };

      const handleExit = () => { if (pendingUpdates.length) onUpdateCards(pendingUpdates); onExit(); };

      if (queue.length === 0) {
        return (
          <div className="max-w-3xl mx-auto px-6 py-8 min-h-screen flex flex-col">
            <ModeHeader title={deck.title} subtitle="Review" onExit={handleExit} />
            <div className="flex-1 flex flex-col items-center justify-center text-center animate-pop">
              <div className="inline-flex p-5 rounded-full bg-emerald-100 text-emerald-700 mb-6"><Trophy size={48} /></div>
              <div className="font-display text-5xl md:text-6xl font-extrabold text-stone-900 mb-2">{doneCount > 0 ? 'Session complete' : 'Nothing to review'}</div>
              <div className="text-stone-500 mb-2 text-lg">{doneCount > 0 ? `${doneCount} ${doneCount === 1 ? 'card' : 'cards'} reviewed.` : 'Try the "New" or "All" filter.'}</div>
              <div className="text-stone-500 mb-10 text-sm">Progress saved.</div>
              <button onClick={handleExit} className="bg-stone-900 text-white px-6 py-3 rounded-full font-semibold hover:bg-indigo-600 transition-colors">Back to deck</button>
            </div>
          </div>
        );
      }

      return (
        <div className="max-w-3xl mx-auto px-6 py-8 min-h-screen flex flex-col">
          <ModeHeader title={deck.title} subtitle="Review" onExit={handleExit} />

          <div className="flex items-center justify-between mb-6 flex-wrap gap-2">
            <div className="inline-flex p-1 bg-stone-100 rounded-full">
              {[['due', 'Due'], ['new', 'New'], ['all', 'All']].map(([k, label]) => (
                <button key={k} onClick={() => changeFilter(k)}
                  className={`px-4 py-1.5 rounded-full text-sm font-semibold transition-colors ${filter === k ? 'bg-white text-stone-900 shadow-sm' : 'text-stone-500 hover:text-stone-900'}`}>
                  {label}
                </button>
              ))}
            </div>
            <button onClick={() => setAutoSpeak((v) => !v)} className={`flex items-center gap-2 px-3 py-1.5 rounded-full text-sm font-medium transition-colors ${autoSpeak ? 'bg-indigo-100 text-indigo-700' : 'bg-stone-100 text-stone-500'}`}>
              <Volume2 size={14} /> Auto-play {autoSpeak ? 'on' : 'off'}
            </button>
          </div>

          <div className="mb-6">
            <div className="flex justify-between text-xs font-bold uppercase tracking-wider text-stone-500 mb-2">
              <span>Reviewed {doneCount}</span>
              <span>Remaining {queue.length}</span>
            </div>
            <div className="h-2 bg-stone-200 rounded-full overflow-hidden">
              <div className="h-full bg-emerald-500 transition-all duration-500" style={{ width: `${doneCount > 0 ? (doneCount / (doneCount + queue.length)) * 100 : 0}%` }} />
            </div>
          </div>

          <div className="flex-1 flex flex-col items-center justify-center">
            {card && (
              <>
                <div className="text-xs text-stone-500 mb-3 font-medium uppercase tracking-wider">
                  Box {card.box ?? 0} · Next: {BOX_LABELS[card.box ?? 0]}
                </div>
                <div className="flip-card w-full aspect-[3/2] max-w-2xl cursor-pointer" onClick={() => setFlipped((f) => !f)}>
                  <div className={`flip-inner ${flipped ? 'flipped' : ''}`}>
                    <div className="flip-face bg-white rounded-3xl border-2 border-stone-200 shadow-lg p-6 md:p-8 flex flex-col items-center justify-center text-center overflow-y-auto">
                      {card.icon && <div className="text-5xl md:text-6xl mb-2 leading-none">{card.icon}</div>}
                      <div className="text-xs uppercase tracking-widest text-stone-400 mb-3 font-bold">Term</div>
                      <div className="font-display text-3xl md:text-5xl font-bold text-stone-900 leading-tight">{card.term}</div>
                      <Transcription definition={card.definition} />
                      <button onClick={(e) => { e.stopPropagation(); speak(card.term, deck.termLang); }} className="mt-4 p-3 bg-stone-100 hover:bg-indigo-100 hover:text-indigo-700 rounded-full transition-colors">
                        <Volume2 size={20} />
                      </button>
                      {Array.isArray(card.examples) && card.examples.length > 0 && (
                        <div className="mt-5 space-y-1.5 text-stone-600 italic text-sm md:text-base max-w-md">
                          {card.examples.map((ex, i) => <div key={i}>« {ex.en} »</div>)}
                        </div>
                      )}
                      <div className="absolute bottom-3 text-xs text-stone-400">Click to see translation</div>
                    </div>
                    <div className="flip-face flip-back bg-stone-900 rounded-3xl shadow-lg p-6 md:p-8 flex flex-col items-center justify-center text-center overflow-y-auto">
                      {card.icon && <div className="text-5xl md:text-6xl mb-2 leading-none">{card.icon}</div>}
                      <div className="text-xs uppercase tracking-widest text-stone-500 mb-3 font-bold">Translation</div>
                      <div className="font-display text-2xl md:text-4xl font-bold text-white leading-tight">{stripIpa(card.definition)}</div>
                      {Array.isArray(card.examples) && card.examples.length > 0 && (
                        <div className="mt-5 space-y-2.5 text-sm md:text-base max-w-md">
                          {card.examples.map((ex, i) => (
                            <div key={i}>
                              <div className="italic text-stone-300">« {ex.en} »</div>
                              <div className="text-stone-400 mt-0.5">{ex.ru}</div>
                            </div>
                          ))}
                        </div>
                      )}
                    </div>
                  </div>
                </div>
                <div className="flex items-center gap-3 mt-8">
                  <button onClick={() => mark(false)} className="px-6 py-3 rounded-full bg-white border-2 border-rose-200 text-rose-600 font-semibold hover:bg-rose-50 transition-all flex items-center gap-2">
                    <RotateCw size={16} /> Don't know
                  </button>
                  <button onClick={() => mark(true)} className="px-6 py-3 rounded-full bg-emerald-600 text-white font-semibold hover:bg-emerald-700 transition-all flex items-center gap-2">
                    <Check size={16} /> I know it
                  </button>
                </div>
              </>
            )}
          </div>
        </div>
      );
    }

    /* ──────────── Test Mode ──────────── */
    function TestMode({ deck, onExit, onUpdateCards }) {
      const questions = useMemo(() => {
        const cards = shuffle(deck.cards);
        return cards.map((c) => {
          const wrongs = shuffle(deck.cards.filter((x) => x.id !== c.id)).slice(0, 3).map((x) => stripIpa(x.definition));
          return { card: c, options: shuffle([stripIpa(c.definition), ...wrongs]) };
        });
      }, [deck.cards]);

      const [idx, setIdx] = useState(0);
      const [picked, setPicked] = useState(null);
      const [answers, setAnswers] = useState([]);
      const [done, setDone] = useState(false);
      const q = questions[idx];
      const correct = q ? stripIpa(q.card.definition) : null;

      const pick = (opt) => {
        if (picked !== null) return;
        setPicked(opt);
        const isRight = opt === correct;
        const newAnswers = [...answers, { correct: isRight, term: q.card.term, picked: opt, answer: correct, card: q.card }];
        setAnswers(newAnswers);
        setTimeout(() => {
          if (idx + 1 >= questions.length) {
            const updates = newAnswers.map((a) => updateCardProgress(a.card, a.correct));
            onUpdateCards(updates);
            setDone(true);
          } else {
            setIdx((i) => i + 1); setPicked(null);
          }
        }, 1100);
      };

      if (done) {
        const score = answers.filter((a) => a.correct).length;
        const pct = Math.round((score / answers.length) * 100);
        return (
          <div className="max-w-3xl mx-auto px-6 py-8 min-h-screen flex flex-col">
            <ModeHeader title={deck.title} subtitle="Test results" onExit={onExit} />
            <div className="flex-1 flex flex-col items-center justify-center text-center">
              <div className="inline-flex p-5 rounded-full bg-amber-100 text-amber-700 mb-6"><Trophy size={48} /></div>
              <div className="font-display text-7xl font-extrabold text-stone-900 mb-1">{pct}%</div>
              <div className="text-stone-500 mb-10">{score} out of {answers.length} correct · Progress saved</div>
              <div className="w-full max-w-xl space-y-2 mb-8">
                {answers.map((a, i) => (
                  <div key={i} className={`bg-white rounded-2xl p-4 border-2 ${a.correct ? 'border-emerald-200' : 'border-rose-200'} flex items-center gap-4 text-left`}>
                    <div className={`p-2 rounded-full ${a.correct ? 'bg-emerald-100 text-emerald-700' : 'bg-rose-100 text-rose-600'}`}>
                      {a.correct ? <Check size={16} /> : <X size={16} />}
                    </div>
                    <div className="flex-1">
                      <div className="font-semibold text-stone-900 flex items-center gap-2">
                        {a.term}
                        <button onClick={() => speak(a.term, deck.termLang)} className="p-1 hover:bg-stone-100 rounded-full"><Volume2 size={12} className="text-stone-400" /></button>
                      </div>
                      {!a.correct && <div className="text-xs text-stone-500">You: <span className="text-rose-600">{a.picked}</span> · Correct: <span className="text-emerald-700">{a.answer}</span></div>}
                    </div>
                  </div>
                ))}
              </div>
              <button onClick={onExit} className="bg-stone-900 text-white px-6 py-3 rounded-full font-semibold hover:bg-indigo-600 transition-colors">Back to deck</button>
            </div>
          </div>
        );
      }

      return (
        <div className="max-w-3xl mx-auto px-6 py-8 min-h-screen flex flex-col">
          <ModeHeader title={deck.title} subtitle="Test" onExit={onExit} />
          <div className="mb-6">
            <div className="flex justify-between text-xs font-bold uppercase tracking-wider text-stone-500 mb-2">
              <span>Question {idx + 1} of {questions.length}</span>
              <span>Score {answers.filter((a) => a.correct).length}</span>
            </div>
            <div className="h-2 bg-stone-200 rounded-full overflow-hidden">
              <div className="h-full bg-indigo-600 transition-all duration-500" style={{ width: `${(idx / questions.length) * 100}%` }} />
            </div>
          </div>
          <div className="flex-1 flex flex-col justify-center animate-pop" key={idx}>
            <div className="text-xs uppercase tracking-widest text-stone-400 mb-3 font-bold text-center">What's the translation of</div>
            <div className="flex items-center justify-center gap-3 mb-10 flex-wrap">
              <div className="font-display text-5xl md:text-6xl font-extrabold text-stone-900 text-center leading-tight">{q.card.term}</div>
              <button onClick={() => speak(q.card.term, deck.termLang)} className="p-3 bg-stone-100 hover:bg-indigo-100 hover:text-indigo-700 rounded-full transition-colors">
                <Volume2 size={20} />
              </button>
            </div>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
              {q.options.map((opt) => {
                const isPicked = picked === opt;
                const isRight = opt === correct;
                const reveal = picked !== null;
                let cls = 'bg-white border-stone-200 hover:border-stone-900 text-stone-900';
                if (reveal && isRight) cls = 'bg-emerald-50 border-emerald-500 text-emerald-900';
                else if (reveal && isPicked && !isRight) cls = 'bg-rose-50 border-rose-500 text-rose-900 animate-shake';
                else if (reveal) cls = 'bg-white border-stone-200 text-stone-400 opacity-60';
                return (
                  <button key={opt} onClick={() => pick(opt)} disabled={picked !== null}
                    className={`p-5 rounded-2xl border-2 text-left font-medium transition-all ${cls}`}>{opt}</button>
                );
              })}
            </div>
          </div>
        </div>
      );
    }

    /* ──────────── Match Mode ──────────── */
    function MatchMode({ deck, onExit }) {
      const sample = useMemo(() => shuffle(deck.cards).slice(0, Math.min(6, deck.cards.length)), [deck.cards]);
      const initialTiles = useMemo(() => {
        const tiles = [];
        sample.forEach((c) => {
          tiles.push({ tileId: 't_' + c.id, cardId: c.id, text: c.term, type: 'term' });
          tiles.push({ tileId: 'd_' + c.id, cardId: c.id, text: stripIpa(c.definition), type: 'def' });
        });
        return shuffle(tiles);
      }, [sample]);

      const [tiles, setTiles] = useState(initialTiles);
      const [matched, setMatched] = useState(new Set());
      const [selected, setSelected] = useState(null);
      const [wrong, setWrong] = useState(null);
      const [elapsed, setElapsed] = useState(0);
      const [done, setDone] = useState(false);
      const startRef = useRef(Date.now());

      useEffect(() => {
        if (done) return;
        const t = setInterval(() => setElapsed(Math.floor((Date.now() - startRef.current) / 100) / 10), 100);
        return () => clearInterval(t);
      }, [done]);

      useEffect(() => {
        if (matched.size > 0 && matched.size === sample.length) setDone(true);
      }, [matched, sample.length]);

      const tap = (tile) => {
        if (matched.has(tile.cardId) || wrong) return;
        if (tile.type === 'term') speak(tile.text, deck.termLang);
        if (!selected) { setSelected(tile.tileId); return; }
        if (selected === tile.tileId) { setSelected(null); return; }
        const other = tiles.find((t) => t.tileId === selected);
        if (other.cardId === tile.cardId && other.type !== tile.type) {
          setMatched((m) => new Set([...m, tile.cardId]));
          setSelected(null);
        } else {
          setWrong(tile.tileId);
          setTimeout(() => { setWrong(null); setSelected(null); }, 500);
        }
      };

      if (done) {
        return (
          <div className="max-w-3xl mx-auto px-6 py-8 min-h-screen flex flex-col">
            <ModeHeader title={deck.title} subtitle="Match" onExit={onExit} />
            <div className="flex-1 flex flex-col items-center justify-center text-center animate-pop">
              <div className="inline-flex p-5 rounded-full bg-rose-100 text-rose-600 mb-6"><Zap size={48} /></div>
              <div className="font-display text-7xl font-extrabold text-stone-900 mb-1">{elapsed.toFixed(1)}s</div>
              <div className="text-stone-500 mb-10">All {sample.length} pairs matched!</div>
              <div className="flex gap-3">
                <button onClick={() => { setTiles(shuffle(initialTiles)); setMatched(new Set()); setSelected(null); setElapsed(0); setDone(false); startRef.current = Date.now(); }}
                  className="bg-rose-600 text-white px-6 py-3 rounded-full font-semibold hover:bg-rose-700 transition-colors">Play again</button>
                <button onClick={onExit} className="bg-white border border-stone-300 text-stone-900 px-6 py-3 rounded-full font-semibold hover:border-stone-900 transition-colors">Back to deck</button>
              </div>
            </div>
          </div>
        );
      }

      return (
        <div className="max-w-4xl mx-auto px-6 py-8 min-h-screen flex flex-col">
          <ModeHeader title={deck.title} subtitle="Match" onExit={onExit} />
          <div className="flex justify-between items-center mb-6">
            <div className="text-xs font-bold uppercase tracking-wider text-stone-500">Matched {matched.size} / {sample.length}</div>
            <div className="flex items-center gap-2 font-display font-bold text-2xl text-stone-900 tabular-nums">
              <Clock size={18} className="text-stone-400" /> {elapsed.toFixed(1)}s
            </div>
          </div>
          <div className="grid grid-cols-2 md:grid-cols-3 gap-3 flex-1">
            {tiles.map((tile) => {
              const isMatched = matched.has(tile.cardId);
              const isSelected = selected === tile.tileId;
              const isWrong = wrong === tile.tileId;
              let cls = 'bg-white border-stone-200 hover:border-stone-900 text-stone-900 cursor-pointer';
              if (isMatched) cls = 'bg-emerald-50 border-emerald-300 text-emerald-700 opacity-50 cursor-default';
              else if (isWrong) cls = 'bg-rose-50 border-rose-500 text-rose-900 animate-shake';
              else if (isSelected) cls = 'bg-indigo-50 border-indigo-600 text-indigo-900 scale-[0.97]';
              return (
                <button key={tile.tileId} onClick={() => tap(tile)} disabled={isMatched}
                  className={`p-5 rounded-2xl border-2 font-medium text-center transition-all min-h-[100px] flex items-center justify-center ${cls}`}>{tile.text}</button>
              );
            })}
          </div>
        </div>
      );
    }

    /* ──────────── Shared ──────────── */
    function ModeHeader({ title, subtitle, onExit }) {
      return (
        <div className="flex items-center justify-between mb-8">
          <button onClick={onExit} className="flex items-center gap-2 text-stone-500 hover:text-stone-900 font-medium transition-colors"><X size={20} /></button>
          <div className="text-center">
            <div className="text-xs uppercase tracking-widest text-stone-400 font-bold">{subtitle}</div>
            <div className="font-display font-bold text-stone-900">{title}</div>
          </div>
          <div className="w-6" />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
